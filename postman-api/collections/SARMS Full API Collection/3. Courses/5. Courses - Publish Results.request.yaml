$kind: http-request
url: "{{base_url}}/courses/publish"
method: PUT
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "semesters": [
            1
        ]
    }
auth:
  type: bearer
  credentials:
    token: "{{adminToken}}"
scripts:
  - type: afterResponse
    code: pm.test("Status code 200", function () { pm.response.to.have.status(200);
      });
    language: text/javascript
order: 5000
