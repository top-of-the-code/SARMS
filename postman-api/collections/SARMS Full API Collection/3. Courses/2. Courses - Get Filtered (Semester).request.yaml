$kind: http-request
url: "{{base_url}}/courses?semester=1"
method: GET
headers:
  Content-Type: application/json
queryParams:
  semester: "1"
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: pm.test("Status code is 200", function () {
      pm.response.to.have.status(200); });
    language: text/javascript
order: 2000
