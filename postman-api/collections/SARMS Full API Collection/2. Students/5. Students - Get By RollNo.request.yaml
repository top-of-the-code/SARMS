$kind: http-request
url: "{{base_url}}/students/{{studentRollNo}}"
method: GET
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: pm.test("Status code is 200", function () {
      pm.response.to.have.status(200); });
    language: text/javascript
order: 5000
