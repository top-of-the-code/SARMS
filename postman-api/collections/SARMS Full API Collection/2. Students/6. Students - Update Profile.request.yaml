$kind: http-request
url: "{{base_url}}/students/{{studentRollNo}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "personalPhone": "555-555-5555"
    }
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: pm.test("Status 200", function () { pm.response.to.have.status(200); });
    language: text/javascript
order: 6000
