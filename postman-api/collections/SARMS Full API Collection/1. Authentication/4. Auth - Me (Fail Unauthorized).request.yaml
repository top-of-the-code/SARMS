$kind: http-request
url: "{{base_url}}/auth/me"
method: GET
headers:
  Content-Type: application/json
scripts:
  - type: afterResponse
    code: pm.test("Status code is 401 or 403", function () {
      pm.expect(pm.response.code).to.be.oneOf([401,403]); });
    language: text/javascript
order: 4000
