$kind: http-request
url: "{{base_url}}/admin/upload-results"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "userId": "{{adminUserId}}",
        "password": "wrong"
    }
auth:
  type: bearer
  credentials:
    token: "{{adminToken}}"
scripts:
  - type: afterResponse
    code: pm.test("Status code 401", function () { pm.response.to.have.status(401);
      });
    language: text/javascript
order: 2000
