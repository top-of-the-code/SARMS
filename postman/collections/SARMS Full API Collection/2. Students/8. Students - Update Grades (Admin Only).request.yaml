$kind: http-request
url: "{{base_url}}/students/{{studentRollNo}}/grades"
method: PUT
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "semester": 1,
        "courses": [
            {
                "courseCode": "{{courseCode}}",
                "newGrade": "A"
            }
        ]
    }
auth:
  type: bearer
  credentials:
    token: "{{adminToken}}"
scripts:
  - type: afterResponse
    code: pm.test("Status code is 200", function () {
      pm.response.to.have.status(200); });
    language: text/javascript
order: 8000
