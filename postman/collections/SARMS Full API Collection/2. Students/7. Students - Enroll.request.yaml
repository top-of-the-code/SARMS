$kind: http-request
url: "{{base_url}}/students/{{studentRollNo}}/enroll"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "semester": 1,
        "courseCodes": [
            "{{courseCode}}"
        ]
    }
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: pm.test("Status 200 or 400 (if invalid course)", function () {
      pm.expect(pm.response.code).to.be.oneOf([200, 400]); });
    language: text/javascript
order: 7000
