$kind: http-request
url: "{{base_url}}/auth/forgot-password"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "userId": "{{adminUserId}}",
        "newPassword": "password123"
    }
scripts:
  - type: afterResponse
    code: pm.test("Status is 200", function() { pm.response.to.have.status(200); });
    language: text/javascript
order: 5000
