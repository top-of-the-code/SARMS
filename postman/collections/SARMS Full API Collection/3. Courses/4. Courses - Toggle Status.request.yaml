$kind: http-request
url: "{{base_url}}/courses/{{courseCode}}/status"
method: PUT
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: pm.test("Status code 200", function () { pm.response.to.have.status(200);
      });
    language: text/javascript
order: 4000
