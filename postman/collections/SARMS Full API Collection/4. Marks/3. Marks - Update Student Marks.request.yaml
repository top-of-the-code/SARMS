$kind: http-request
url: "{{base_url}}/marks/{{courseCode}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    [
        {
            "rollNo": "{{studentRollNo}}",
            "name": "Test Student",
            "marks": {
                "comp1": 25,
                "comp2": 65
            }
        }
    ]
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: pm.test("Status code 200 or 400", function () {
      pm.expect(pm.response.code).to.be.oneOf([200, 400]); });
    language: text/javascript
order: 3000
