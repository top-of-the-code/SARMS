$kind: http-request
url: "{{base_url}}/marks/{{courseCode}}"
method: GET
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: pm.test("Status code 200", function () { pm.response.to.have.status(200);
      });
    language: text/javascript
order: 1000
